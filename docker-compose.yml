# TradePanel Docker Stack

services:
  db:
    # Pin to minor version — update intentionally after testing (see OPTIMIZATION_SCHEDULE.md quarterly tech review)
    image: postgres:16.6
    container_name: tradepanel-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: tradepanel-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - MT5_BRIDGE_URL=http://host.docker.internal:8001
      - WAHA_URL=http://waha:3000
    networks:
      - default
      - gateway_net
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradepanel-backend.rule=Host(`api.tradepanel.mraskwhy.local`)"
      - "traefik.http.services.tradepanel-backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.tradepanel-backend.entrypoints=web"
    volumes:
      - ./config:/app/config
      - ./results:/app/results
      - ./logs:/app/logs
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./notifications:/app/notifications
      - ./utils:/app/utils
      - ./strategies:/app/strategies
      - ./scheduler:/app/scheduler
      - ./webapp:/app/webapp
      - ./analytics:/app/analytics
      - ./.env:/app/.env
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn webapp.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: tradepanel-frontend
    restart: unless-stopped
    networks:
      - default
      - gateway_net
    ports:
      - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradepanel-frontend.rule=Host(`tradepanel.mraskwhy.local`)"
      - "traefik.http.services.tradepanel-frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.tradepanel-frontend.entrypoints=web"
    depends_on:
      - backend

  telegram-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: tradepanel-telegram
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - MT5_BRIDGE_URL=http://host.docker.internal:8001
      - WAHA_URL=http://waha:3000
    volumes:
      - ./config:/app/config
      - ./results:/app/results
      - ./logs:/app/logs
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./notifications:/app/notifications
      - ./utils:/app/utils
      - ./strategies:/app/strategies
      - ./scheduler:/app/scheduler
      - ./webapp:/app/webapp
      - ./analytics:/app/analytics
      - ./.env:/app/.env
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: python -m notifications.telegram_bot

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: tradepanel-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - MT5_BRIDGE_URL=http://host.docker.internal:8001
      - WAHA_URL=http://waha:3000
    volumes:
      - ./config:/app/config
      - ./results:/app/results
      - ./logs:/app/logs
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./notifications:/app/notifications
      - ./utils:/app/utils
      - ./strategies:/app/strategies
      - ./scheduler:/app/scheduler
      - ./webapp:/app/webapp
      - ./analytics:/app/analytics
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    command: python -m scheduler.docker_jobs

  waha:
    # waha: latest stable for 2026 compatibility
    image: devlikeapro/waha:latest
    container_name: tradepanel-waha
    restart: unless-stopped
    networks:
      - default
      - gateway_net
    ports:
      - "8025:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradepanel-waha.rule=Host(`waha.mraskwhy.local`)"
      - "traefik.http.services.tradepanel-waha.loadbalancer.server.port=3000"
      - "traefik.http.routers.tradepanel-waha.entrypoints=web"
    environment:
      - WAHA_API_KEY=tradepanel_secret
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=TradePanelWAHA2024!
      - WHATSAPP_SWAGGER_USERNAME=admin
      - WHATSAPP_SWAGGER_PASSWORD=TradePanelWAHA2024!
    volumes:
      - waha_sessions:/app/.sessions

  db-backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    container_name: tradepanel-db-backup
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_NAME=trading_platform
      # DB_PASSWORD is provided via .env
      # AWS/R2/Telegram credentials should be in .env
    volumes:
      - ./backups:/backups
      - ./scripts:/app/scripts
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:4.8.1
    container_name: tradepanel-adminer

    restart: unless-stopped
    networks:
      - default
      - gateway_net
    ports:
      - "8090:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradepanel-adminer.rule=Host(`db-admin.mraskwhy.local`)"
      - "traefik.http.services.tradepanel-adminer.loadbalancer.server.port=8080"
      - "traefik.http.routers.tradepanel-adminer.entrypoints=web"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  waha_sessions:

networks:
  gateway_net:
    external: true

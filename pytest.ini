[pytest]
# pytest configuration for TradePanel
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add project root to path for imports
pythonpath = .

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests (requires MT5 terminal)
    slow: Tests that take > 5 seconds
    mt5: Tests that require MT5 connection

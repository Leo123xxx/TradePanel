# TradePanel Configuration
# ============================================================
# SECRETS: All credentials loaded from .env — never hardcode here.
# PAIRS:   Per-pair cost assumptions are the single source of truth
#          for the backtesting engine, paper engine, and risk manager.
# ============================================================

system:
  mode: paper # paper | live
  log_level: INFO
  heartbeat_interval: 60 # seconds

platform:
  platform_name: MT5_Algorithmic_Trading_Platform
  version: 1.0

# ============================================================
# TRADING PAIRS — 5 approved pairs with per-pair cost model
# The backtesting engine must load spread/slippage from here,
# NOT use a single global default.
# ============================================================
# ── ACCOUNT CURRENCY ─────────────────────────────────────────────────────────
# CONFIRMED: Exness account is ZAR-denominated (verified from MT5 margin rates)
# All P&L and risk calculations must convert from instrument profit currency to ZAR.
# USD/ZAR rate is fetched live from MT5 (USDZAR tick). Fallback used if MT5 offline.
account:
  currency: ZAR
  backtesting_usdzar_rate: 18.50   # Fixed rate used in backtests (update quarterly)
  backtesting_jpyzar_rate: 0.1233  # JPY→ZAR rate (USDJPY ~150 × USDZAR ~18.50 / 150)
  backtesting_balance_zar: 180000  # Default starting balance for backtests (~$10k USD)

pairs:

  XAUUSD:
    display_name: "Gold (Spot)"
    enabled: true
    profit_currency: USD          # CONFIRMED: profit in USD, convert to ZAR at close
    contract_size: 100            # 100 troy oz per lot
    digits: 3
    spread_pips: 5.0              # Realistic 3–5 pip-equivalent on H1
    slippage_pips: 2.0
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 entry + 3.5 exit (Exness 2026-04)
    min_lot: 0.01
    max_lot: 200.0                # CONFIRMED: Exness max volume (was wrongly set to 1.0)
    pip_value_per_lot: 10.0       # $10 per pip per lot (100 oz × $0.10/oz per pip)
    typical_daily_range_pips: 250
    session_bias: london_ny
    swap_long_pts: -571.2         # CONFIRMED: Exness swap long (in points, 2026-04-24)
    swap_short_pts: 0.0           # CONFIRMED: Exness swap short
    data_start: "2022-01-01"
    notes: "Primary instrument. ZAR pip value = pip_value_per_lot × USDZAR rate."

  EURUSD:
    display_name: "Euro / US Dollar"
    enabled: true
    profit_currency: USD
    contract_size: 100000         # 100,000 EUR per lot
    digits: 5
    spread_pips: 1.0
    slippage_pips: 0.5
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 + 3.5 (Exness 2026-04-24)
    min_lot: 0.01
    max_lot: 200.0                # CONFIRMED: Exness max volume
    pip_value_per_lot: 10.0       # $10 per pip per lot (100,000 × 0.0001)
    typical_daily_range_pips: 80
    session_bias: all
    swap_long_pts: -6.7           # CONFIRMED: Exness swap long (in points, 2026-04-24)
    swap_short_pts: 0.0           # CONFIRMED: Exness swap short
    data_start: "2022-01-01"
    notes: "Benchmark pair. Tightest spreads. Use as strategy calibration pair."

  GBPUSD:
    display_name: "British Pound / US Dollar"
    enabled: true
    profit_currency: USD
    contract_size: 100000         # 100,000 GBP per lot
    digits: 5
    spread_pips: 1.5
    slippage_pips: 0.8
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 + 3.5 (Exness 2026-04-24)
    min_lot: 0.01
    max_lot: 200.0                # CONFIRMED: Exness max volume
    pip_value_per_lot: 10.0       # $10 per pip per lot
    typical_daily_range_pips: 110
    session_bias: london
    swap_long_pts: -1.1           # CONFIRMED: Exness swap long (in points, 2026-04-24)
    swap_short_pts: -1.5          # CONFIRMED: Exness swap short (both sides negative)
    data_start: "2022-01-01"
    notes: "Higher volatility than EURUSD. Both swap sides negative — avoid weekend holds."

  USDJPY:
    display_name: "US Dollar / Japanese Yen"
    enabled: true
    profit_currency: JPY          # CONFIRMED: profit in JPY — needs JPY→ZAR conversion
    contract_size: 100000         # 100,000 USD per lot
    digits: 3
    spread_pips: 1.0
    slippage_pips: 0.5
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 + 3.5 (Exness 2026-04-24)
    min_lot: 0.01
    max_lot: 300.0                # CONFIRMED: Exness max volume
    pip_value_per_lot: 9.0        # ~$9 per pip per lot (varies with USDJPY rate — dynamic)
    typical_daily_range_pips: 80
    session_bias: tokyo_ny
    swap_long_pts: 0.0            # CONFIRMED: Exness swap long (2026-04-24)
    swap_short_pts: -14.9         # CONFIRMED: Exness swap short (in points, 2026-04-24)
    data_start: "2022-01-01"
    notes: >
      Profit currency is JPY. Engine uses pip_value_per_lot (USD approx) then
      multiplies by USDZAR. For precise ZAR P&L: use JPYZAR rate directly.
      BoJ intervention risk in 2022–2024 WFO windows.

  XAGUSD:
    display_name: "Silver (Spot)"
    enabled: true
    profit_currency: USD
    contract_size: 5000           # 5,000 troy oz per lot
    digits: 3
    spread_pips: 6.0              # Wider than Gold
    slippage_pips: 3.0
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 + 3.5 (Exness 2026-04-24)
    min_lot: 0.01
    max_lot: 200.0                # CONFIRMED: Exness max (was wrongly set to 3.0)
    pip_value_per_lot: 5.0        # $5 per pip per lot (5,000 oz × $0.001/oz per pip)
    typical_daily_range_pips: 400
    session_bias: london_ny
    swap_long_pts: -9.3           # CONFIRMED: Exness swap long (in points, 2026-04-24)
    swap_short_pts: 0.0           # CONFIRMED: Exness swap short
    data_start: "2022-01-01"
    notes: "High correlation with XAUUSD. Max lot was critically wrong (3→200)."

  BTCUSD:
    display_name: "Bitcoin / US Dollar"
    enabled: true
    profit_currency: USD
    contract_size: 1              # 1 BTC per lot
    digits: 2
    spread_pips: 50.0             # Floating — ~$50 estimate
    slippage_pips: 25.0
    commission_per_lot: 4.0       # CONFIRMED round-turn: 2.0 entry + 2.0 exit (Exness 2026-04-24)
    min_lot: 0.01                 # CONFIRMED: Exness minimum
    max_lot: 200.0                # CONFIRMED: Exness maximum (paper mode: use ≤0.05)
    pip_value_per_lot: 1.0        # $1 per point per lot
    typical_daily_range_pips: 1500
    session_bias: all_24_7
    swap_long_pts: -1459.5        # CONFIRMED: Exness swap long (was wrong: -1378.3)
    swap_short_pts: 0.0           # CONFIRMED: Exness swap short
    data_start: "2022-01-01"
    notes: >
      Commission corrected to 4.0 round-turn (was 2.0 — caused 2× undercharge in backtests).
      Swap corrected to -1459.5 (was -1378.3). Paper mode: keep lot_size ≤ 0.01–0.05.

  ETHUSD:
    display_name: "Ethereum / US Dollar"
    enabled: true
    profit_currency: USD
    contract_size: 1              # 1 ETH per lot
    digits: 2
    spread_pips: 5.0
    slippage_pips: 3.0
    commission_per_lot: 1.0       # CONFIRMED round-turn: 0.5 entry + 0.5 exit (Exness 2026-04-24)
    min_lot: 0.1                  # CONFIRMED: Exness minimum
    max_lot: 2000.0               # CONFIRMED: Exness maximum (paper mode: use ≤2.0)
    pip_value_per_lot: 1.0        # $1 per point per lot
    typical_daily_range_pips: 80
    session_bias: all_24_7
    swap_long_pts: -44.2          # CONFIRMED: Exness swap long (was -43.6)
    swap_short_pts: 0.0           # CONFIRMED: Exness swap short
    data_start: "2022-01-01"
    notes: >
      Commission corrected to 1.0 round-turn (was 0.5 — caused 2× undercharge in backtests).
      Swap corrected to -44.2 (was -43.6). Strong correlation with BTCUSD — one strategy max.

# ============================================================
# BACKTESTING — cost model applied to all backtest runs
# ============================================================
backtesting:
  slippage_model: per_pair # per_pair | standard (use per_pair — loads from pairs above)
  default_spread: 2.0 # Fallback only — always prefer pairs[pair].spread_pips
  commission_per_lot: 7.0 # Fallback only
  swaps_enabled: true
  data_split:
    in_sample_pct: 0.70 # 70% IS
    out_of_sample_pct: 0.20 # 20% OOS (never touched during optimisation)
    forward_test_pct: 0.10 # 10% most recent for paper confirmation

# ============================================================
# RISK MANAGEMENT
# ============================================================
risk_management:
  risk_per_trade_pct: 10.0 # % of account balance risked per trade
  max_lot_size: 1.0 # Hard ceiling on any single trade
  max_concurrent_positions: 5 # Across ALL strategies combined
  max_spread_pips: 10.0 # Skip trade if live spread exceeds this
  max_drawdown_warning_pct: 12.0 # Telegram warning fires at this level
  max_drawdown_hard_pct: 20.0 # Strategy auto-pauses; open positions closed
  strategy_correlation_threshold: 0.7 # Monthly correlation check — alert above this
  use_macro_regime_filter: false # PATH B: DISABLED FOR TESTING — Enable macro-based bias filter
  use_multi_tf_confirmation: false # PATH B: DISABLED FOR TESTING — Enable higher-TF trend confirmation
  signal_validity_bars: 2 # Minimum period a signal is considered "active"
  trading_hours:
    start: "00:30"
    end: "23:59"
    days: [ 0, 1, 2, 3, 4 ] # Monday–Friday (0=Mon) for FX/metals
  crypto_trading_hours:
    start: "00:10"
    end: "23:59"
    days: [ 0, 1, 2, 3, 4, 5, 6 ] # All 7 days — crypto never closes
    pairs: [ "BTCUSD", "ETHUSD" ]

# ============================================================
# NOTIFICATIONS
# ============================================================
notifications:
  telegram_enabled: true
  min_alert_interval: 300 # Seconds between repeated alerts (prevent spam)
  daily_summary_time: "18:00" # Send daily P&L summary
  weekly_report_day: monday
  weekly_report_time: "08:00"

# ============================================================
# SCHEDULER
# ============================================================
scheduler:
  heartbeat_interval_sec: 60
  telegram_heartbeat_interval_mins: 30
  mt5_check_interval_sec: 60
  position_sync_interval_sec: 300
  signal_check_interval_sec: 900 # 15 minutes
  pnl_rollup_interval_sec: 3600 # 1 hour
  regime_detect_interval_sec: 3600 # 1 hour
  data_ingest_hours: "0,6,12,18"   # Pull fresh data 4x daily at :05 past each hour
  data_ingest_minute: 5
  overnight_backtest_hour: 2        # Run full backtest at 02:00 UTC Mon-Fri
  overnight_backtest_minute: 0
  db_cleanup_day: sunday
  db_cleanup_time: "00:30"
  db_retention_days: 120


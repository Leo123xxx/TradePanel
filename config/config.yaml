# ============================================================
# BACKTESTING — cost model applied to all backtest runs
# ============================================================
backtesting:
  slippage_model: per_pair # per_pair | standard (use per_pair — loads from pairs above)
  default_spread: 2.0 # Fallback only — always prefer pairs[pair].spread_pips
  commission_per_lot: 7.0 # Fallback only
  swaps_enabled: true
  data_split:
    in_sample_pct: 0.70 # 70% IS
    out_of_sample_pct: 0.20 # 20% OOS (never touched during optimisation)
    forward_test_pct: 0.10 # 10% most recent for paper confirmation

# ============================================================
# RISK MANAGEMENT
# ============================================================
risk_management:
  risk_per_trade_pct: 1.0 # % of account balance risked per trade
  max_lot_size: 1.0 # Hard ceiling on any single trade
  blocked_pairs: ["USDZAR", "USDTRY"] # Pairs to ignore regardless of strategy
  max_concurrent_positions: 5 # Across ALL strategies combined
  max_spread_pips: 10.0 # Skip trade if live spread exceeds this
  max_drawdown_warning_pct: 12.0 # Telegram warning fires at this level
  max_drawdown_hard_pct: 20.0 # Strategy auto-pauses; open positions closed
  strategy_correlation_threshold: 0.7 # Monthly correlation check — alert above this
  use_macro_regime_filter: true  # ENABLED 2026-04-30 — Enable macro-based bias filter
  use_multi_tf_confirmation: true # ENABLED 2026-04-26 — Enable higher-TF trend confirmation
  signal_validity_bars: 2 # Minimum period a signal is considered "active"
  trading_hours:
    start: "00:30"
    end: "23:59"
    days: [ 0, 1, 2, 3, 4 ] # Monday–Friday (0=Mon) for FX/metals
  crypto_trading_hours:

    enabled: true
    profit_currency: USD          # CONFIRMED: profit in USD, convert to ZAR at close
    contract_size: 100            # 100 troy oz per lot
    digits: 3
    spread_pips: 5.0              # Realistic 3–5 pip-equivalent on H1
    slippage_pips: 2.0
    commission_per_lot: 7.0       # CONFIRMED round-turn: 3.5 entry + 3.5 exit (Exness 2026-04)
    min_lot: 0.01
    max_lot: 200.0                # CONFIRMED: Exness max volume (was wrongly set to 1.0)
    pip_value_per_lot: 10.0       # $10 per pip per lot (100 oz × $0.10/oz per pip)
    typical_daily_range_pips: 250
    session_bias: london_ny

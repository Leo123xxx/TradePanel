# TradePanel Configuration
# ============================================================
# SECRETS: All credentials loaded from .env — never hardcode here.
# PAIRS:   Per-pair cost assumptions are the single source of truth
#          for the backtesting engine, paper engine, and risk manager.
# ============================================================

system:
  mode: paper # paper | live
  log_level: INFO
  heartbeat_interval: 60 # seconds

platform:
  platform_name: MT5_Algorithmic_Trading_Platform
  version: 1.0

# ============================================================
# TRADING PAIRS — 18 confirmed pairs with per-pair cost model (expanded 2026-04-30)
# The backtesting engine must load spread/slippage from here,
# NOT use a single global default.
# ============================================================
# ── ACCOUNT CURRENCY ─────────────────────────────────────────────────────────
# CONFIRMED: Exness account is ZAR-denominated (verified from MT5 margin rates)
# All P&L and risk calculations must convert from instrument profit currency to ZAR.
# USD/ZAR rate is fetched live from MT5 (USDZAR tick). Fallback used if MT5 offline.
account:
  currency: ZAR
  backtesting_usdzar_rate: 18.50   # Fixed rate used in backtests (update quarterly)
  backtesting_jpyzar_rate: 0.1233  # JPY→ZAR rate (USDJPY ~150 × USDZAR ~18.50 / 150)
  backtesting_balance_zar: 180000  # Default starting balance for backtests (~$10k USD)
  backtesting_cadzar_rate: 13.50   # CAD→ZAR: USDZAR(18.50) / USDCAD(1.37) ≈ 13.50 (update quarterly)
  backtesting_audzar_rate: 12.03   # AUD→ZAR: USDZAR(18.50) × AUDUSD(0.65) ≈ 12.03 (update quarterly)


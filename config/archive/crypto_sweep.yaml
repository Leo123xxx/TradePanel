ttm_squeeze:
  enabled: true
  pairs: ["BTCUSD", "ETHUSD"]
  timeframes: ["M15", "H1", "H4", "D1"]
  parameters:
    bb_period: 20
    bb_std: 2.0
    kc_period: 20
    kc_mult: 1.5
    mom_period: 20
    tp_atr_mult: 3.0
    sl_atr_mult: 1.5

supertrend:
  enabled: true
  pairs: ["BTCUSD", "ETHUSD"]
  timeframes: ["H1", "H4", "D1"]
  parameters:
    atr_period: 10
    multiplier: 3.0
    adx_min: 25
    tp_atr_mult: 4.0
    sl_atr_mult: 1.5

donchian_trend:
